{% extends 'base.html' %}

{% block content %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .book-list {
            list-style-type: none;
            padding: 0;
        }
        .book-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-item:last-child {
            border-bottom: none;
        }
        .book-info {
            flex-grow: 1;
        }
        .book-title {
            font-weight: bold;
            font-size: 1.1em;
        }
        .book-author {
            color: #666;
            font-style: italic;
        }
        .book-actions {
            display: flex;
            gap: 10px;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .btn {
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9em;
        }
        .btn-borrow {
            background-color: #28a745;
            color: white;
        }
        .btn-borrow:hover {
            background-color: #218838;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination a, .pagination span {
            padding: 8px 12px;
            margin: 0 4px;
            text-decoration: none;
            border: 1px solid #ddd;
            color: #007bff;
        }
        .pagination a:hover {
            background-color: #e9ecef;
        }
        .pagination .current {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        .alert {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<div class="jumbotron text-center">
    <h1 class="display-4">Welcome to Our Library</h1>
    <p class="lead">Browse, borrow, and return books with ease.</p>
    <hr class="my-4">
    <a class="btn btn-primary btn-lg" href="{% url 'books:catalog' %}" role="button">Explore Catalog</a>
</div>
{% endblock %}
